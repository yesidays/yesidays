name: Metrics

on:
  # Corre diario a las 12:00 UTC (~6am hora del centro de México)
  schedule: [{cron: "0 12 * * *"}]
  # Te deja correrlo a mano desde la pestaña Actions (útil para el primer run)
  workflow_dispatch:
  # Regenera cuando haces push a main
  push: {branches: ["master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para que el action commitee el SVG
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: yesidays
          template: classic
          config_timezone: America/Mexico_City

          # Secciones base (header con stats, actividad, repos, etc.)
          base: header, activity, community, repositories, metadata

          # --- Lenguajes más usados ---
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_categories: markup, programming
          # Descomenta la siguiente línea si tu top-langs sale dominado por notebooks/HTML:
          # plugin_languages_ignored: html, jupyter notebook

          plugin_calendar: yes
          plugin_calendar_limit: 2

